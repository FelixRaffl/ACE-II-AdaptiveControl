# wiring.yml - Adaptive Control DC Motor, prototype wiring pin reference
# Render:   pip install wireviz   (requires Graphviz in PATH)
#           wireviz wiring.yml     -> wiring.png / wiring.svg / wiring.html
#
# Topology: ESP32 via USB (power + serial), 12 V bench supply -> L298N VM, common ground.
# Known encoder leads are blue for VCC and black for GND.
# Control and power jumper colours are arbitrary prototype wiring colours.

connectors:
  PSU:
    type: Bench supply
    subtype: 12 V current limit
    pinlabels: [+12V, GND]
  ESP32:
    type: ESP32-WROOM-32 DevKit
    notes: USB to PC (power + serial)
    pinlabels: [3V3, GND, GND2, GPIO14, GPIO26, GPIO27, GPIO32, GPIO33]
  L298N:
    type: L298N H-bridge
    notes: ENA jumper removed (PWM active); motor sees about 8 V (drop about 4 V)
    pinlabels: [VM, GND, ENA, IN1, IN2, OUT1, OUT2]
  MOTOR:
    type: Hyuduo 25GA371
    subtype: Motor + Encoder (11 PPR, x4 = 44 CPR)
    pinlabels: [M+, M-, EncVCC, EncGND, EncA, EncB]

cables:
  W_PWR:                       # bench supply -> L298N power
    colors: [RD, BK]
    gauge: 0.5 mm2
  W_GND:                       # common ground L298N -> ESP32
    colors: [BK]
  W_CTRL:                      # ESP32 -> L298N control signals
    colors: [OG, BN, VT]
  W_MOTOR:                     # L298N -> motor power
    colors: [RD, WH]
    gauge: 0.5 mm2
  W_ENC:                       # motor encoder -> ESP32
    wirecount: 4

connections:
  -                            # 12 V supply
    - PSU: [+12V, GND]
    - W_PWR: [1, 2]
    - L298N: [VM, GND]
  -                            # common ground
    - L298N: [GND]
    - W_GND: [1]
    - ESP32: [GND]
  -                            # PWM + direction
    - ESP32: [GPIO14, GPIO26, GPIO27]
    - W_CTRL: [1, 2, 3]
    - L298N: [ENA, IN1, IN2]
  -                            # motor power
    - L298N: [OUT1, OUT2]
    - W_MOTOR: [1, 2]
    - MOTOR: [M+, M-]
  -                            # encoder signals and supply
    - MOTOR: [EncVCC, EncGND, EncA, EncB]
    - W_ENC: [1, 2, 3, 4]
    - ESP32: [3V3, GND2, GPIO32, GPIO33]
